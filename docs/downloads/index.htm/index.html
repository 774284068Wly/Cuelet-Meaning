<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cuelet - 解读图片含义</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#17171c;color:#f2f2f4;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}.wrap{width:min(680px,calc(100% - 40px));padding:50px 0}h1{font-size:42px;line-height:1.1;margin:0 0 18px}p{color:#b1b1ba;font-size:16px;line-height:1.7}ol{margin:28px 0;padding-left:22px;color:#d8d8dd;line-height:2}.note{padding:16px;border:1px solid #38383f;border-radius:8px;background:#202026}code{color:#bdc8ff}</style></head><body><main class="wrap"><h1>解读图片含义</h1><p>从构图、色彩、光线、材质、主体关系和视觉符号出发，分析图片可能表达的观念、情绪与美学语言。</p><ol><li>打开扩展设置，填写视觉模型接口。</li><li>点击工具栏中的“选图解读含义”。</li><li>移动到网页图片上单击，或直接使用图片右键菜单。</li><li>在含义、美学、依据和 JSON 之间切换查看。</li></ol><div class="note">快捷键：Mac <code>Command+Shift+M</code>，Windows <code>Ctrl+Shift+M</code>。按 <code>Esc</code> 退出选图。</div></main></body></html>
