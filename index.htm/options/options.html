<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cuelet Meaning 设置</title><link rel="stylesheet" href="options.css"></head><body><main><header><h1>Cuelet Meaning</h1><p>解读图片含义 · 设置</p></header>
<section><h2>视觉模型接口</h2><label>服务商<select id="provider"></select></label><label>Base URL<input id="baseUrl" type="url" autocomplete="off" placeholder="https://api.openai.com/v1"></label><label>API Key<input id="apiKey" type="password" autocomplete="new-password" placeholder="仅保存在本机"></label><label>模型<input id="model" autocomplete="off" placeholder="gpt-4o-mini"></label><div class="grid"><label>最长边<input id="maxDim" type="number" min="256" max="4096"></label><label>最大输出 Token<input id="maxTokens" type="number" min="500" max="16000"></label></div><label class="check"><input id="jsonMode" type="checkbox"> 请求 JSON 模式</label><button id="test" class="secondary">测试连接</button><span id="testStatus"></span></section>
<section><h2>图片含义分析指令</h2><textarea id="meaningPromptTemplate" rows="28"></textarea><button id="resetPrompt" class="secondary">恢复默认指令</button></section>
<section><h2>Eagle 归档</h2><label class="check"><input id="eagleEnabled" type="checkbox"> 启用存入 Eagle</label><label>Eagle URL<input id="eagleUrl" type="url"></label><label>Eagle Token<input id="eagleToken" type="password" autocomplete="new-password" placeholder="可选，仅保存在本机"></label><div class="row"><button id="testEagle" class="secondary">测试 Eagle</button><button id="folders" class="secondary">刷新文件夹</button></div><label>目标文件夹<select id="eagleFolder"><option value="">根目录</option></select></label></section>
<div class="savebar"><span id="saved"></span><button id="save">保存设置</button></div></main><script type="module" src="options.js"></script></body></html>
